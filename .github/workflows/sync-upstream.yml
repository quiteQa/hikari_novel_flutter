name: Sync Upstream Updates

on:
  schedule:
    # 每天 UTC 时间 0:00 检查上游更新（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/15dd/hikari_novel_flutter.git || true

      - name: Fetch upstream changes
        run: |
          git fetch upstream

      - name: Check for upstream updates
        id: check_updates
        run: |
          if git rev-list --count HEAD..upstream/main > /dev/null 2>&1; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "✅ 发现上游更新"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有新的上游更新"
          fi

      - name: Merge upstream changes
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          git merge upstream/main --no-edit
          echo "🔄 已合并上游更新"

      - name: Push changes
        if: steps.check_updates.outputs.has_updates == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin main
          echo "📤 已推送到仓库"

      - name: Create issue on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 上游合并冲突需要手动解决',
              body: `自动合并上游更新时发生冲突，请手动解决。\n\n上游仓库：https://github.com/15dd/hikari_novel_flutter\n\n请执行以下命令手动合并：\n\`\`\`bash\ngit fetch upstream\ngit merge upstream/main\n\`\`\``
            })
